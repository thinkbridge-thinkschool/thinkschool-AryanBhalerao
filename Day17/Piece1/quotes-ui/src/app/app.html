<div class="app-shell">
  <header class="app-header">
    <h1>Quotes Explorer</h1>
    <p class="subtitle">Made with ASP .NET 10 . Angular 21 . Deployed with Azure Cloud</p>
  </header>

  <nav class="tab-bar">
    <a
      class="tab-btn"
      routerLink="/quotes"
      routerLinkActive="active"
    >
      Quotes List
    </a>
    <a
      class="tab-btn"
      routerLink="/create"
      routerLinkActive="active"
    >
      Create Quote
    </a>
    <div class="nav-user">
      @if (svc.loggedIn()) {
        <span class="user-email">{{ svc.currentUserEmail() }}</span>
        <button class="logout-btn" (click)="logout()">Log out</button>
      } @else {
        <button class="login-btn" (click)="login()">Log in</button>
      }
    </div>
  </nav>

  <main class="tab-content">
    <router-outlet />
  </main>

  @if (loadingQuote()) {
    <div class="loading-toast">
      <span class="loading-spinner"></span>
      Loading details…
    </div>
  }
</div>
