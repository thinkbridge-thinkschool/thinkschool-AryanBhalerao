name: .NET Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Change this to your project's .NET version if different

    - name: Restore dependencies
      run: dotnet restore RefactoringExercise.slnx # Update if your solution file is named differently
      
    - name: Build
      run: dotnet build RefactoringExercise.slnx --no-restore
      
    - name: Test
      run: dotnet test RefactoringExercise.slnx --no-build --verbosity normal
