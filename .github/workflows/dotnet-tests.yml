name: .NET Tests

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - "Day1/piece4/**"
      - ".github/workflows/dotnet-tests.yml"
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - "Day1/piece4/**"
      - ".github/workflows/dotnet-tests.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x # Change this to your project's .NET version if different

    - name: Restore dependencies
      run: dotnet restore Day1/piece4/RefactoringExercise/RefactoringExercise.slnx 
    - name: Build
      run: dotnet build Day1/piece4/RefactoringExercise/RefactoringExercise.slnx --no-restore
      
    - name: Test
      run: dotnet test Day1/piece4/RefactoringExercise/RefactoringExercise.slnx --no-build --verbosity normal
