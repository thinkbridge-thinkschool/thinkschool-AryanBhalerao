name: piece7 – Integration tests (SQL Server via Testcontainers)

on:
  push:
    paths:
      - 'Day3/piece7/**'
      - '.github\workflows\day3piece7ci.yml'
  pull_request:
    paths:
      - 'Day3/piece7/**'
      - '.github\workflows\day3piece7ci.yml'

jobs:
  integration-tests:
    name: Run integration tests against real SQL Server
    runs-on: ubuntu-latest        # GitHub-hosted Ubuntu runners ship with Docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the SQL Server 2022 Docker image layers so subsequent runs skip the ~1.5 GB pull.
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.docker-cache
          key: docker-mssql-2022-${{ runner.os }}
          restore-keys: |
            docker-mssql-2022-

      - name: Pre-pull SQL Server image (populate cache on first run)
        run: |
          docker pull mcr.microsoft.com/mssql/server:2022-latest
          docker save mcr.microsoft.com/mssql/server:2022-latest \
            -o /tmp/.docker-cache/mssql-2022.tar || true

      - name: Load SQL Server image from cache (if available)
        run: |
          if [ -f /tmp/.docker-cache/mssql-2022.tar ]; then
            docker load -i /tmp/.docker-cache/mssql-2022.tar
          fi

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore Day3/piece7/Quotes.Tests.Integration

      - name: Build
        run: dotnet build Day3/piece7/Quotes.Tests.Integration --no-restore --configuration Release

      - name: Run integration tests
        working-directory: Day3/piece7
        run: |
          dotnet test Quotes.Tests.Integration \
            --no-build \
            --configuration Release \
            --logger "console;verbosity=normal" \
            --results-directory ./TestResults
        env:
          # Testcontainers uses the Docker daemon on the runner — no extra config needed.
          DOTNET_ENVIRONMENT: Testing

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: Day3/piece7/TestResults
