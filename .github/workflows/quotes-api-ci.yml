name: QuotesAPI CI

on:
  push:
    branches: ["main", "master"]
    paths:
      - "Day3/piece3/**"
      - ".github/workflows/quotes-api-ci.yml"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "Day3/piece3/**"
      - ".github/workflows/quotes-api-ci.yml"

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Day3/piece3/QuotesApi.Tests/QuotesApi.Tests.csproj

      - name: Build
        run: dotnet build Day3/piece3/QuotesApi.Tests/QuotesApi.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test Day3/piece3/QuotesApi.Tests/QuotesApi.Tests.csproj --no-build --configuration Release --verbosity normal
